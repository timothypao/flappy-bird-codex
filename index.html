<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Flappy Bird</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="game-shell" aria-label="Flappy Bird style game">
      <canvas
        id="gameCanvas"
        width="480"
        height="720"
        role="img"
        aria-label="A Flappy Bird style game. Press space or click to flap."
      ></canvas>
      <p class="hint">Space / Click to flap</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
